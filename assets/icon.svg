<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Grassroots">
  <!-- The Grassroots brand mark: an orbit - continuous monitoring around a
       point on the ground, with the moment of change marked on the ring.
       Transparent background so the mark sits on any surface. -->
  <circle cx="256" cy="256" r="178" fill="none" stroke="#0C85C7" stroke-width="36"/>
  <circle cx="382" cy="130" r="58" fill="#0C85C7"/>
  <circle cx="256" cy="256" r="34" fill="#0C85C7" opacity=".55"/>
</svg>
